name: Integration

on: push

jobs:
  build-and-lint:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install deps (with cache)
        uses: bahmutov/npm-install@v1
      - name: Build
        run: yarn build
      - name: Lint
        run: yarn lint
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Test (${{ matrix.jbrowse-version }})
    needs: build-and-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jbrowse-version: [nightly, v3.7.0]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install deps (with cache)
        uses: bahmutov/npm-install@v1
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Setup JBrowse ${{ matrix.jbrowse-version }}
        run: |
          if [ "${{ matrix.jbrowse-version }}" = "nightly" ]; then
            npx @jbrowse/cli create .test-jbrowse --nightly
          else
            npx @jbrowse/cli create .test-jbrowse-${{ matrix.jbrowse-version }} --tag ${{ matrix.jbrowse-version }}
          fi
      - name: Run tests
        run: yarn vitest run
        env:
          TEST_JBROWSE_VERSION: ${{ matrix.jbrowse-version }}
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.jbrowse-version }}
          path: test-screenshots/
