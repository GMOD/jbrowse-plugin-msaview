name: Integration

on: push

jobs:
  integration:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'yarn'
      - name: Install deps
        run: yarn install
      - name: Build
        run: yarn build
      - name: Lint
        run: yarn lint
